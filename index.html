<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hava Proqnozu</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="weather-container">
      
      <div class="search">
        <input type="text" id="city-input" placeholder="Şəhər adı daxil edin" />
        <button id="search-btn">Axtar</button>
      </div>

    
      <div class="location">
        <span id="city">Şəhər</span>, <span id="country">Ölkə</span>
      </div>

      <div class="temperature">
        <span id="temp">°C</span>
      </div>

      
      <div class="condition">
        <span id="condition-text">Hava açıqlaması</span>
      </div>

      
      <div class="icon">
        <div id="displaydiv">
          <img id="condition-icon" src="" alt="Weather Icon" />
          <div id="localtime">Saat</div>
        </div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
